<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishUP — AIGC 英语教学视频</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
  .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 60px 20px; text-align: center; }
  .hero h1 { font-size: 2em; margin-bottom: 10px; }
  .hero p { font-size: 1.1em; opacity: 0.85; max-width: 700px; margin: 0 auto; }
  .hero .badge { display: inline-block; background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; margin-top: 16px; font-size: 0.9em; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
  .card:hover { transform: translateY(-3px); }
  .card video { width: 100%; display: block; background: #000; }
  .card .video-wrap { aspect-ratio: 16 / 9; overflow: hidden; background: #000; }
  .card .video-wrap video { width: 100%; height: 100%; object-fit: contain; }
  .card .label { padding: 12px 16px; font-weight: 600; font-size: 1.1em; text-align: center; }
  .card .label small { display: block; font-weight: 400; color: #888; font-size: 0.8em; margin-top: 4px; }
  footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.9em; }
  footer a { color: #0f3460; text-decoration: none; }
</style>
</head>
<body>

<div class="hero">
  <h1>EnglishUP — AIGC 英语教学视频</h1>
  <p>每个单词配 15 秒电影级情境短视频，建立"情境-单词-例句"三维记忆锚点</p>
  <div class="badge">12 个示例 · AI Generated · 点击播放</div>
</div>

<div class="container">
  <div class="grid">
    <div class="card">
      <div class="video-wrap"><video src="https://raw.githubusercontent.com/xsj1984/EnglishUPbyAIGC/main/videos/shark.mp4" controls muted preload="metadata"></video></div>

    </div>

    </div>
    <div class="card">

    </div>
    <div class="card">
      <div class="video-wrap"><video src="https://raw.githubusercontent.com/xsj1984/EnglishUPbyAIGC/main/videos/make%20friends.mp4" controls muted preload="metadata"></video></div>

    </div>

    <div class="card">
      <div class="video-wrap"><video src="https://raw.githubusercontent.com/xsj1984/EnglishUPbyAIGC/main/videos/moment.mp4" controls muted preload="metadata"></video></div>
      <div class="label">moment<small>时刻</small></div>
    </div>
    <div class="card">
      <div class="video-wrap"><video src="https://raw.githubusercontent.com/xsj1984/EnglishUPbyAIGC/main/videos/reluctant.mp4" controls muted preload="metadata"></video></div>
      <div class="label">reluctant<small>不情愿</small></div>
    </div>

      <div class="label">strange<small>奇怪</small></div>
    </div>
    <div class="card">
      <div class="video-wrap"><video src="https://raw.githubusercontent.com/xsj1984/EnglishUPbyAIGC/main/videos/Base%20camp.mp4" controls muted preload="metadata"></video></div>

<footer>
  <p><a href="https://github.com/xsj1984/EnglishUPbyAIGC">GitHub</a> · <a href="https://engup.cn">engup.cn</a> · AI 赋能英语句子教学</p>

</body>
</html>
